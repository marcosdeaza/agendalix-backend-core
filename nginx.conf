# /etc/nginx/sites-available/agendalix
# Proxy frontal hacia el contenedor Docker (puerto 3010 del host).
#
#   ln -sf /etc/nginx/sites-available/agendalix /etc/nginx/sites-enabled/agendalix
#   nginx -t && systemctl reload nginx
#
# El contenedor expone sólo en 127.0.0.1:3010 (ver docker-compose.yml),
# así que no hay riesgo de exponer el puerto bruto al exterior.

upstream agendalix_upstream {
    server 127.0.0.1:3010;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name agendalix.com www.agendalix.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name agendalix.com www.agendalix.com;

    ssl_certificate     /etc/letsencrypt/live/agendalix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agendalix.com/privkey.pem;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 25M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    # Cache Next.js static chunks aggressively
    location /_next/static/ {
        proxy_pass http://agendalix_upstream;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://agendalix_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
