<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="agendaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#agendaGrad)" stroke-width="5" filter="url(#glow2)"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#34d399" stroke-width="2" opacity="0.5"/>
  <!-- Calendar / Chat shape -->
  <rect x="65" y="70" width="70" height="60" rx="10" fill="none" stroke="url(#agendaGrad)" stroke-width="4" filter="url(#glow2)"/>
  <line x1="65" y1="90" x2="135" y2="90" stroke="#34d399" stroke-width="2" opacity="0.8"/>
  <line x1="85" y1="60" x2="85" y2="80" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="115" y1="60" x2="115" y2="80" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <!-- Checkmark -->
  <polyline points="80,110 95,125 120,100" fill="none" stroke="#10b981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow2)"/>
  <!-- Pulse dots -->
  <circle cx="155" cy="55" r="4" fill="#f59e0b" filter="url(#glow2)"/>
  <circle cx="160" cy="100" r="3" fill="#10b981" opacity="0.7"/>
  <circle cx="40" cy="145" r="4" fill="#f59e0b" filter="url(#glow2)"/>
</svg>
