<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#065f46;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="box2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.2" />
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#10b981" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg2)" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="16" font-weight="bold">AGENDALIX — OPERATIONS FLOW</text>
  
  <!-- Nginx -->
  <rect x="320" y="50" width="160" height="50" rx="8" fill="url(#box2)" stroke="#34d399" stroke-width="2" filter="url(#shadow2)"/>
  <text x="400" y="70" text-anchor="middle" fill="#ecfdf5" font-family="monospace" font-size="13" font-weight="bold">NGINX</text>
  <text x="400" y="88" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="10">443 TLS · 80 · Proxy</text>
  
  <!-- Lines down -->
  <line x1="400" y1="100" x2="400" y2="130" stroke="#10b981" stroke-width="2" stroke-dasharray="4"/>
  <line x1="400" y1="130" x2="400" y2="150" stroke="#10b981" stroke-width="2"/>
  
  <!-- Next.js App -->
  <rect x="200" y="150" width="400" height="70" rx="8" fill="url(#box2)" stroke="#f59e0b" stroke-width="2" filter="url(#shadow2)"/>
  <text x="400" y="175" text-anchor="middle" fill="#ecfdf5" font-family="monospace" font-size="13" font-weight="bold">NEXT.JS APP ROUTER</text>
  <text x="400" y="195" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="10">Landing · Panel · Admin · API Routes · Cron</text>
  <text x="400" y="210" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="10">TypeScript · Tailwind · Zod Validation</text>
  
  <!-- Lines down -->
  <line x1="400" y1="220" x2="400" y2="250" stroke="#10b981" stroke-width="2" stroke-dasharray="4"/>
  <line x1="400" y1="250" x2="150" y2="250" stroke="#10b981" stroke-width="2"/>
  <line x1="400" y1="250" x2="400" y2="250" stroke="#10b981" stroke-width="2"/>
  <line x1="400" y1="250" x2="650" y2="250" stroke="#10b981" stroke-width="2"/>
  <line x1="150" y1="250" x2="150" y2="270" stroke="#10b981" stroke-width="2"/>
  <line x1="400" y1="250" x2="400" y2="270" stroke="#10b981" stroke-width="2"/>
  <line x1="650" y1="250" x2="650" y2="270" stroke="#10b981" stroke-width="2"/>
  
  <!-- Supabase -->
  <rect x="50" y="270" width="200" height="50" rx="8" fill="url(#box2)" stroke="#06b6d4" stroke-width="2" filter="url(#shadow2)"/>
  <text x="150" y="295" text-anchor="middle" fill="#ecfdf5" font-family="monospace" font-size="13" font-weight="bold">SUPABASE</text>
  <text x="150" y="310" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="10">PostgreSQL · RLS · Realtime</text>
  
  <!-- Evolution API -->
  <rect x="300" y="270" width="200" height="50" rx="8" fill="url(#box2)" stroke="#10b981" stroke-width="2" filter="url(#shadow2)"/>
  <text x="400" y="295" text-anchor="middle" fill="#ecfdf5" font-family="monospace" font-size="13" font-weight="bold">EVOLUTION API</text>
  <text x="400" y="310" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="10">WhatsApp Business Gateway</text>
  
  <!-- DeepSeek -->
  <rect x="550" y="270" width="200" height="50" rx="8" fill="url(#box2)" stroke="#a855f7" stroke-width="2" filter="url(#shadow2)"/>
  <text x="650" y="295" text-anchor="middle" fill="#ecfdf5" font-family="monospace" font-size="13" font-weight="bold">DEEPSEEK</text>
  <text x="650" y="310" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="10">AI Intent Parsing & Support</text>
  
  <!-- Bottom info -->
  <text x="400" y="370" text-anchor="middle" fill="#059669" font-family="monospace" font-size="10">Host: Contabo VPS 164.68.102.55 · Docker (127.0.0.1:3010) · Let's Encrypt TLS 1.3</text>
</svg>
